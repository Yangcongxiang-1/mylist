# ==========================================
# ScreenshotOCR 配置文件
# ==========================================
# 配置方式: 
#   方式1: 在此文件中填写（推荐）
#   方式2: 在 ~/.bashrc 中 export 对应环境变量
# 同时使用两种方式时，环境变量优先级更高
# ==========================================

# ---- 百度 OCR API Key（必填）----
# 申请地址: https://console.bce.baidu.com/ai/#/ai/ocr/overview/index
export BAIDU_API_KEY=""
export BAIDU_SECRET_KEY=""

# ---- 百度翻译 API Key（可选，翻译功能需要）----
# 申请地址: https://console.bce.baidu.com/ai/#/ai/machinetranslation/overview/index
# 创建应用后获取 API Key 和 Secret Key（与 OCR 分开，独立配置）
export BAIDU_TRANSLATE_API_KEY=""
export BAIDU_TRANSLATE_SECRET_KEY=""

# ---- 默认翻译目标语言 ----
# zh=中文 en=英文 ja=日文 ko=韩文 fr=法文 de=德文 ru=俄文
export TARGET_LANG="zh"
